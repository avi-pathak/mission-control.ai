services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: mission
      POSTGRES_DB: mission_control
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Single service: the Go server hosts the REST API (/api/v1), WebSocket, AND
  # the dashboard SPA on one port.
  server:
    # Use the published image (recommended). To build from source instead,
    # comment `image:` and uncomment `build:`.
    image: avipathak/mission-control-server:latest
    # build:
    #   context: ..
    #   dockerfile: deploy/Dockerfile.server
    environment:
      MC_LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://mission:mission@postgres:5432/mission_control?sslmode=disable"
      JWT_SECRET: "change-me-in-production"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "change-me-please"
      MC_PUBLIC_URL: "http://localhost:8080"
      MC_LOG_LEVEL: "info"
      MC_CORS_ORIGINS: "*"
      MC_RETENTION_LOG_HOURS: "72"
      MC_RETENTION_METRIC_HOURS: "72"
      # Optional outbound email for invites. Leave MC_SMTP_HOST empty to disable
      # (invite links are still returned in the UI).
      MC_SMTP_HOST: ""
      MC_SMTP_PORT: "587"
      MC_SMTP_USER: ""
      MC_SMTP_PASS: ""
      MC_SMTP_FROM: ""
      # Web Push for blocked-session notifications. Generate keys with
      # `make vapid`. Leave empty to disable push.
      MC_VAPID_PUBLIC_KEY: ""
      MC_VAPID_PRIVATE_KEY: ""
      MC_VAPID_SUBJECT: "mailto:admin@example.com"
      MC_BLOCKED_NOTIFY_SECONDS: "30"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pg-data:
