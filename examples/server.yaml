# Mission Control server configuration.
# Everything can also be set via environment variables (env wins over YAML):
#   DATABASE_URL     postgres:// DSN, or a SQLite file path (default: mission-control.db)
#   JWT_SECRET       secret for signing dashboard session tokens (REQUIRED in prod)
#   ADMIN_EMAIL      bootstrap owner email (created on first run if no users exist)
#   ADMIN_PASSWORD   bootstrap owner password
#   MC_LISTEN_ADDR   listen address (default :8080)
#   MC_PUBLIC_URL    externally reachable base URL, used in enrollment commands
#   MC_LOG_LEVEL     debug|info|warn|error

listenAddr: ":8080"
publicUrl: ""

# Postgres DSN for production, e.g.
#   postgres://user:pass@host:5432/dbname?sslmode=disable
# or a SQLite file path for local/dev.
databaseUrl: "mission-control.db"

# Directory of prebuilt agent binaries served at /download for the install
# scripts (install.sh / install.ps1). Build them with `make agents`.
# Names must be mission-control-agent-<os>-<arch>[.exe].
agentBinDir: "bin/agents"

# Signing secret for dashboard JWTs. MUST be set to a strong random value in
# production (or via JWT_SECRET).
jwtSecret: ""

# Bootstrap admin (first run only, when the database has no users).
adminEmail: ""
adminPassword: ""

corsOrigins:
  - "*"

tls:
  enabled: false
  certFile: ""
  keyFile: ""

retention:
  logHours: 72
  metricHours: 72

# Directory of the built dashboard SPA to serve (single-server hosting).
# `make serve-prod` sets this via MC_STATIC_DIR; uncomment to hardcode.
# staticDir: "apps/dashboard/dist"

# Optional outbound email (SMTP). If host is empty, email is disabled and invite
# links are returned via the API only. Env: MC_SMTP_HOST/_PORT/_USER/_PASS/_FROM.
smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""

# Web Push notifications for blocked sessions. Generate keys with `make vapid`.
# If keys are empty, push is disabled. Env: MC_VAPID_PUBLIC_KEY / _PRIVATE_KEY /
# _SUBJECT and MC_BLOCKED_NOTIFY_SECONDS.
webPush:
  vapidPublicKey: ""
  vapidPrivateKey: ""
  subject: "mailto:admin@example.com"

# Notify when a session has been waiting for approval this many seconds
# (0 disables). Default 30.
blockedNotifySeconds: 30

logLevel: "info"
